<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공지 · 이벤트 관리 | NUADE Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="admin-page">
  <aside class="admin-sidebar">
    <a class="admin-brand" href="services.html">NUADE</a>
    <nav aria-label="관리자 메뉴">
      <a href="services.html">시술 관리</a>
      <a href="classes.html">수강 관리</a>
      <a href="posts.html" aria-current="page">공지 · 이벤트</a>
      <a href="#">문의</a>
      <a href="#">기본 설정</a>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <p class="section-kicker">Admin</p>
        <h1>공지 · 이벤트</h1>
      </div>
      <button class="btn btn-primary" type="button">새 글 작성</button>
    </header>

    <section class="admin-grid">
      <article class="admin-panel">
        <div class="admin-panel-head">
          <div>
            <p class="section-kicker">Write</p>
            <h2>글 작성</h2>
          </div>
        </div>
        <form class="admin-form" action="#" method="post">
          <label>
            글 종류
            <select name="type">
              <option value="notice">공지</option>
              <option value="event">이벤트</option>
            </select>
          </label>
          <label>
            제목
            <input name="title" type="text" placeholder="제목을 입력하세요">
          </label>
          <label>
            내용
            <textarea name="body" rows="8" placeholder="본문을 입력하세요"></textarea>
          </label>
          <div class="admin-form-row">
            <label>
              시작일
              <input name="start_at" type="date">
            </label>
            <label>
              종료일
              <input name="end_at" type="date">
            </label>
          </div>
          <div class="admin-form-row">
            <label>
              팝업 노출
              <select name="is_popup">
                <option value="0">사용 안 함</option>
                <option value="1">메인 팝업으로 노출</option>
              </select>
            </label>
            <label>
              공개 여부
              <select name="is_visible">
                <option value="1">공개</option>
                <option value="0">숨김</option>
              </select>
            </label>
          </div>
          <button class="btn btn-primary" type="submit">저장</button>
        </form>
      </article>

      <article class="admin-panel">
        <div class="admin-panel-head">
          <div>
            <p class="section-kicker">Preview</p>
            <h2>게시판 형태</h2>
          </div>
        </div>
        <div class="admin-post-list">
          <a href="#"><span class="post-badge">공지</span><strong>NUADE 홈페이지 리뉴얼 준비 중</strong><time>2026.06.16</time></a>
          <a href="#"><span class="post-badge event">이벤트</span><strong>첫 방문 상담 이벤트</strong><time>2026.06.16</time></a>
          <a href="#"><span class="post-badge">공지</span><strong>예약 변경 및 취소 안내</strong><time>2026.06.16</time></a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
