<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>소소문 결제 연결 중</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #111827;
        --bg-bottom: #050816;
        --card: rgba(15, 23, 42, 0.86);
        --line: rgba(148, 163, 184, 0.16);
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #7c3aed;
        --primary-2: #4f46e5;
        --error: #fda4af;
        --error-bg: rgba(127, 29, 29, 0.26);
        --shadow: 0 30px 90px rgba(3, 7, 18, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        background:
          radial-gradient(circle at top right, rgba(124, 58, 237, 0.28), transparent 28%),
          radial-gradient(circle at left center, rgba(79, 70, 229, 0.18), transparent 30%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      .layout {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        border-radius: 32px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        padding: 28px 24px 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #ddd6fe;
        background: rgba(124, 58, 237, 0.18);
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 30px;
        line-height: 1.22;
        letter-spacing: -0.04em;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .amount {
        margin-top: 22px;
        padding: 18px 18px 16px;
        border-radius: 24px;
        border: 1px solid rgba(124, 58, 237, 0.18);
        background: rgba(30, 41, 59, 0.55);
      }

      .amount-label {
        font-size: 12px;
        color: var(--muted);
      }

      .amount-value {
        margin-top: 8px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .progress-wrap {
        margin-top: 22px;
        padding: 18px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--line);
      }

      .spinner {
        width: 58px;
        height: 58px;
        border-radius: 999px;
        border: 4px solid rgba(148, 163, 184, 0.18);
        border-top-color: #c4b5fd;
        animation: spin 0.9s linear infinite;
      }

      .progress-head {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .progress-title {
        font-size: 18px;
        font-weight: 700;
      }

      .progress-sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .step-list {
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #cbd5e1;
        font-size: 14px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, #a78bfa, #7c3aed);
        box-shadow: 0 0 0 6px rgba(124, 58, 237, 0.12);
      }

      .status {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(30, 41, 59, 0.82);
        border: 1px solid var(--line);
        color: #e2e8f0;
        line-height: 1.6;
      }

      .status.error {
        background: var(--error-bg);
        border-color: rgba(244, 63, 94, 0.26);
        color: var(--error);
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 18px;
        font: inherit;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        color: white;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
      }

      button.secondary {
        color: #e2e8f0;
        background: rgba(30, 41, 59, 0.85);
        border: 1px solid var(--line);
      }

      details {
        margin-top: 18px;
      }

      summary {
        cursor: pointer;
        color: #cbd5e1;
        font-size: 13px;
      }

      .logs {
        margin-top: 12px;
        padding: 14px;
        border-radius: 18px;
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #cbd5e1;
        font-family: 'Cascadia Code', 'Consolas', monospace;
        font-size: 12px;
        line-height: 1.65;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @media (max-width: 480px) {
        .layout {
          padding: 12px;
        }

        .card {
          padding: 24px 18px 20px;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="card">
        <div class="badge">SOSOMUN x NICEPAY</div>
        <h1>나이스페이먼츠를 불러오는 중</h1>
        <p class="desc">
          결제창이 자동으로 열립니다. 잠시만 기다려 주세요.
          열리지 않으면 아래 버튼으로 다시 시도할 수 있습니다.
        </p>

        <div class="amount">
          <div class="amount-label">충전 예정 포인트</div>
          <div class="amount-value" id="amountText">-</div>
        </div>

        <div class="progress-wrap">
          <div class="progress-head">
            <div class="spinner" aria-hidden="true"></div>
            <div>
              <div class="progress-title">결제창 연결 준비 중</div>
              <div class="progress-sub" id="progressSub">
                나이스페이 결제 환경을 확인하고 있습니다.
              </div>
            </div>
          </div>

          <ul class="step-list">
            <li class="step"><span class="dot"></span><span>결제 요청 정보를 확인합니다.</span></li>
            <li class="step"><span class="dot"></span><span>나이스페이 SDK를 불러옵니다.</span></li>
            <li class="step"><span class="dot"></span><span>결제창을 열고 인증을 시작합니다.</span></li>
          </ul>

          <div class="status" id="statusBox">결제 정보를 읽는 중입니다.</div>

          <div class="actions">
            <button id="payBtn" class="primary" type="button">결제창 다시 열기</button>
            <button id="copyBtn" class="secondary" type="button">로그 복사하기</button>
          </div>
        </div>

        <details>
          <summary>문제가 있을 때만 로그 보기</summary>
          <div class="logs">
            <pre id="logOutput">로그를 준비하는 중입니다...</pre>
          </div>
        </details>
      </section>
    </div>

    <script>
      (function () {
        const logOutput = document.getElementById('logOutput');
        const statusBox = document.getElementById('statusBox');
        const amountText = document.getElementById('amountText');
        const progressSub = document.getElementById('progressSub');
        const payButton = document.getElementById('payBtn');
        const copyButton = document.getElementById('copyBtn');
        const logLines = [];
        let requested = false;
        let sdkPromise = null;

        function appendLog(level, message, meta) {
          const line =
            '[' + new Date().toISOString() + '] [' + level + '] ' + message +
            (meta === undefined ? '' : ' ' + JSON.stringify(meta));
          logLines.push(line);
          logOutput.textContent = logLines.join('\n');

          if (level === 'error') {
            console.error('[NicePayCheckout] ' + message, meta ?? '');
          } else if (level === 'warn') {
            console.warn('[NicePayCheckout] ' + message, meta ?? '');
          } else {
            console.log('[NicePayCheckout] ' + message, meta ?? '');
          }
        }

        function setStatus(message, tone) {
          statusBox.textContent = message;
          statusBox.className = tone === 'error' ? 'status error' : 'status';
          progressSub.textContent =
            tone === 'error'
              ? '결제창을 다시 열거나 로그를 복사해 공유해 주세요.'
              : '브라우저가 나이스페이 결제창으로 곧 전환됩니다.';
        }

        function getParam(name) {
          const value = new URLSearchParams(window.location.search).get(name);
          return value ? value.trim() : '';
        }

        function loadConfig() {
          const amount = Number(getParam('amount'));
          const config = {
            clientId: getParam('clientId'),
            orderId: getParam('orderId'),
            amount: Number.isFinite(amount) ? amount : 0,
            goodsName: getParam('goodsName'),
            returnUrl: getParam('returnUrl'),
            scriptUrl: getParam('scriptUrl'),
            mode: getParam('mode') || 'sandbox',
          };

          appendLog('info', 'config.loaded', {
            clientId: config.clientId ? config.clientId.slice(0, 8) + '...' : '',
            orderId: config.orderId,
            amount: config.amount,
            returnUrl: config.returnUrl,
            scriptUrl: config.scriptUrl,
            mode: config.mode,
          });

          if (!config.clientId || !config.orderId || !config.amount || !config.goodsName || !config.returnUrl || !config.scriptUrl) {
            throw new Error('필수 결제 파라미터가 누락되었습니다.');
          }

          return config;
        }

        function loadNicepaySdk(config) {
          appendLog('info', 'sdk.load:start', { scriptUrl: config.scriptUrl });

          if (window.AUTHNICE && typeof window.AUTHNICE.requestPay === 'function') {
            appendLog('info', 'sdk.load:cached');
            return Promise.resolve(window.AUTHNICE);
          }

          if (sdkPromise) {
            appendLog('info', 'sdk.load:reuse');
            return sdkPromise;
          }

          sdkPromise = new Promise(function (resolve, reject) {
            const script = document.createElement('script');
            script.src = config.scriptUrl;
            script.async = true;

            script.onload = function () {
              appendLog('info', 'sdk.load:onload');

              let attempts = 0;
              function poll() {
                const ready = !!(window.AUTHNICE && typeof window.AUTHNICE.requestPay === 'function');
                appendLog('info', 'sdk.load:poll', { attempts: attempts, ready: ready });

                if (ready) {
                  appendLog('info', 'sdk.load:ready');
                  resolve(window.AUTHNICE);
                  return;
                }

                attempts += 1;
                if (attempts >= 40) {
                  reject(new Error('NICEPAY SDK loaded but AUTHNICE.requestPay is unavailable'));
                  return;
                }

                window.setTimeout(poll, 150);
              }

              poll();
            };

            script.onerror = function () {
              appendLog('error', 'sdk.load:onerror', { scriptUrl: config.scriptUrl });
              reject(new Error('Failed to load NICEPAY SDK'));
            };

            document.head.appendChild(script);
          });

          return sdkPromise;
        }

        async function startPayment() {
          if (requested) {
            appendLog('warn', 'payment.request:ignored', { reason: 'already_requested' });
            return;
          }

          let config;
          try {
            config = loadConfig();
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'config.invalid', { error: message });
            setStatus(message, 'error');
            return;
          }

          requested = true;
          amountText.textContent = config.amount.toLocaleString() + 'P';
          setStatus('나이스페이 결제창을 준비하는 중입니다.', 'info');
          appendLog('info', 'payment.request:start', {
            orderId: config.orderId,
            amount: config.amount,
            returnUrl: config.returnUrl,
          });

          try {
            await loadNicepaySdk(config);

            if (!window.AUTHNICE || typeof window.AUTHNICE.requestPay !== 'function') {
              throw new Error('AUTHNICE.requestPay is not available');
            }

            appendLog('info', 'payment.request:invoke');
            setStatus('결제창을 여는 중입니다.', 'info');

            window.AUTHNICE.requestPay({
              clientId: config.clientId,
              method: 'card',
              orderId: config.orderId,
              amount: config.amount,
              goodsName: config.goodsName,
              returnUrl: config.returnUrl,
              fnError: function (result) {
                requested = false;
                appendLog('error', 'payment.request:fnError', result || {});
                setStatus(
                  result && result.errorMsg ? result.errorMsg : '결제창 호출 중 오류가 발생했습니다.',
                  'error'
                );
              },
            });
          } catch (error) {
            requested = false;
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'payment.request:catch', { error: message });
            setStatus(message, 'error');
          }
        }

        payButton.addEventListener('click', function () {
          startPayment();
        });

        copyButton.addEventListener('click', async function () {
          try {
            await navigator.clipboard.writeText(logLines.join('\n'));
            appendLog('info', 'logs.copy:success');
            setStatus('로그를 클립보드에 복사했습니다.', 'info');
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'logs.copy:failed', { error: message });
            setStatus('로그 복사에 실패했습니다.', 'error');
          }
        });

        window.addEventListener('error', function (event) {
          appendLog('error', 'window.error', {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
          });
        });

        window.addEventListener('unhandledrejection', function (event) {
          appendLog('error', 'window.unhandledrejection', {
            reason: String(event.reason),
          });
        });

        window.addEventListener('load', function () {
          appendLog('info', 'window.load', {
            href: window.location.href,
            userAgent: navigator.userAgent,
          });

          try {
            const config = loadConfig();
            amountText.textContent = config.amount.toLocaleString() + 'P';
            setStatus('결제창을 곧 열겠습니다. 잠시만 기다려 주세요.', 'info');
            window.setTimeout(startPayment, 180);
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'window.load:configError', { error: message });
            setStatus(message, 'error');
          }
        });
      })();
    </script>
  </body>
</html>
