<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>소소문 테스트 결제</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff9f1;
        --card: #fffdf8;
        --ink: #1f2937;
        --muted: #667085;
        --line: #eadfce;
        --primary: #e76f51;
        --primary-strong: #c75a40;
        --accent: #f4a261;
        --ok: #1d9b6c;
        --warn: #b45309;
        --danger: #c2410c;
        --shadow: 0 30px 80px rgba(124, 58, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(244, 162, 97, 0.28), transparent 28%),
          radial-gradient(circle at right center, rgba(231, 111, 81, 0.22), transparent 30%),
          linear-gradient(180deg, #fff9f1 0%, #fff3e5 100%);
      }

      .layout {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .panel {
        width: 100%;
        max-width: 460px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 253, 248, 0.96);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 18px;
        background:
          linear-gradient(135deg, rgba(231, 111, 81, 0.14), rgba(244, 162, 97, 0.08)),
          linear-gradient(180deg, #fffdf8 0%, #fff7ee 100%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(231, 111, 81, 0.1);
        color: var(--primary-strong);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 30px;
        line-height: 1.2;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 15px;
      }

      .amount-card {
        margin-top: 22px;
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid rgba(231, 111, 81, 0.18);
        background: rgba(255, 255, 255, 0.72);
      }

      .amount-label {
        color: var(--muted);
        font-size: 13px;
      }

      .amount-value {
        margin-top: 6px;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .body {
        padding: 24px 28px 28px;
      }

      .status {
        padding: 16px 18px;
        border-radius: 18px;
        background: #fff4e8;
        border: 1px solid #f5dcc4;
        color: #9a4d21;
        font-size: 14px;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        width: 100%;
        height: 54px;
        border: 0;
        border-radius: 18px;
        padding: 0 18px;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        color: #ffffff;
        background: linear-gradient(135deg, var(--primary), var(--accent));
      }

      button.secondary {
        color: var(--ink);
        background: #fff7ee;
        border: 1px solid var(--line);
      }

      .meta {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .meta-item {
        padding: 12px 14px;
        border-radius: 16px;
        background: #fffaf4;
        border: 1px solid var(--line);
      }

      .meta-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .meta-value {
        word-break: break-all;
        font-size: 13px;
        line-height: 1.6;
      }

      .logs {
        margin-top: 18px;
        padding: 16px;
        border-radius: 18px;
        background: #1f2937;
        color: #e5e7eb;
        min-height: 220px;
      }

      .logs-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .logs-title strong {
        font-size: 14px;
      }

      .hint {
        color: #cbd5e1;
        font-size: 12px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: 'Cascadia Code', 'Consolas', monospace;
        font-size: 12px;
        line-height: 1.65;
      }

      @media (max-width: 540px) {
        .layout {
          padding: 12px;
        }

        .hero,
        .body {
          padding-left: 18px;
          padding-right: 18px;
        }

        h1 {
          font-size: 26px;
        }

        .amount-value {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="panel">
        <div class="hero">
          <span class="eyebrow">NICEPAY TEST CHECKOUT</span>
          <h1>소소문 포인트 결제</h1>
          <p class="desc">
            브라우저 콘솔과 아래 로그 패널에 동일한 디버그 로그가 남습니다.
            문제가 생기면 <code>[NicePayCheckout]</code> 로그를 그대로 공유해 주세요.
          </p>
          <div class="amount-card">
            <div class="amount-label">충전 예정 포인트</div>
            <div class="amount-value" id="amountText">-</div>
          </div>
        </div>

        <div class="body">
          <div class="status" id="statusBox">
            결제 설정을 읽는 중입니다.
          </div>

          <div class="actions">
            <button id="payBtn" class="primary" type="button">결제 진행하기</button>
            <button id="copyBtn" class="secondary" type="button">로그 복사하기</button>
          </div>

          <div class="meta" id="meta"></div>

          <div class="logs">
            <div class="logs-title">
              <strong>브라우저 로그</strong>
              <span class="hint">키워드: NicePayCheckout</span>
            </div>
            <pre id="logOutput">로그를 준비하는 중입니다...</pre>
          </div>
        </div>
      </section>
    </div>

    <script>
      (function () {
        const logOutput = document.getElementById('logOutput');
        const statusBox = document.getElementById('statusBox');
        const metaBox = document.getElementById('meta');
        const amountText = document.getElementById('amountText');
        const payButton = document.getElementById('payBtn');
        const copyButton = document.getElementById('copyBtn');
        const logLines = [];
        let requested = false;
        let sdkPromise = null;

        function appendLog(level, message, meta) {
          const time = new Date().toISOString();
          const serializedMeta = meta === undefined ? '' : ' ' + JSON.stringify(meta);
          const line = '[' + time + '] [' + level + '] ' + message + serializedMeta;
          logLines.push(line);
          logOutput.textContent = logLines.join('\n');

          if (level === 'error') {
            console.error('[NicePayCheckout] ' + message, meta ?? '');
          } else if (level === 'warn') {
            console.warn('[NicePayCheckout] ' + message, meta ?? '');
          } else {
            console.log('[NicePayCheckout] ' + message, meta ?? '');
          }
        }

        function setStatus(message, tone) {
          statusBox.textContent = message;
          statusBox.style.background =
            tone === 'error' ? '#fff1f0' : tone === 'success' ? '#edfdf5' : '#fff4e8';
          statusBox.style.borderColor =
            tone === 'error' ? '#f5c2bd' : tone === 'success' ? '#b7ebd0' : '#f5dcc4';
          statusBox.style.color =
            tone === 'error' ? '#b42318' : tone === 'success' ? '#067647' : '#9a4d21';
        }

        function getParam(name) {
          const value = new URLSearchParams(window.location.search).get(name);
          return value ? value.trim() : '';
        }

        function renderMeta(config) {
          metaBox.innerHTML = '';
          [
            ['주문번호', config.orderId],
            ['결제 금액', config.amount.toLocaleString() + '원'],
            ['상품명', config.goodsName],
            ['returnUrl', config.returnUrl],
            ['scriptUrl', config.scriptUrl],
            ['모드', config.mode],
          ].forEach(function (entry) {
            const label = entry[0];
            const value = entry[1];
            const wrapper = document.createElement('div');
            wrapper.className = 'meta-item';
            wrapper.innerHTML =
              '<span class="meta-label">' + label + '</span>' +
              '<div class="meta-value"></div>';
            wrapper.querySelector('.meta-value').textContent = value;
            metaBox.appendChild(wrapper);
          });
        }

        function loadConfig() {
          const amount = Number(getParam('amount'));
          const config = {
            clientId: getParam('clientId'),
            orderId: getParam('orderId'),
            amount: Number.isFinite(amount) ? amount : 0,
            goodsName: getParam('goodsName'),
            returnUrl: getParam('returnUrl'),
            scriptUrl: getParam('scriptUrl'),
            mode: getParam('mode') || 'sandbox',
          };

          appendLog('info', 'config.loaded', {
            clientId: config.clientId ? config.clientId.slice(0, 8) + '...' : '',
            orderId: config.orderId,
            amount: config.amount,
            returnUrl: config.returnUrl,
            scriptUrl: config.scriptUrl,
            mode: config.mode,
          });

          if (
            !config.clientId ||
            !config.orderId ||
            !config.amount ||
            !config.goodsName ||
            !config.returnUrl ||
            !config.scriptUrl
          ) {
            throw new Error('필수 결제 파라미터가 누락되었습니다.');
          }

          return config;
        }

        function loadNicepaySdk(config) {
          appendLog('info', 'sdk.load:start', { scriptUrl: config.scriptUrl });

          if (window.AUTHNICE && typeof window.AUTHNICE.requestPay === 'function') {
            appendLog('info', 'sdk.load:cached');
            return Promise.resolve(window.AUTHNICE);
          }

          if (sdkPromise) {
            appendLog('info', 'sdk.load:reuse');
            return sdkPromise;
          }

          sdkPromise = new Promise(function (resolve, reject) {
            const script = document.createElement('script');
            script.src = config.scriptUrl;
            script.async = true;

            script.onload = function () {
              appendLog('info', 'sdk.load:onload');

              let attempts = 0;
              const maxAttempts = 40;

              function poll() {
                const authniceType = typeof window.AUTHNICE;
                appendLog('info', 'sdk.load:poll', { attempts, authniceType: authniceType });

                if (window.AUTHNICE && typeof window.AUTHNICE.requestPay === 'function') {
                  appendLog('info', 'sdk.load:ready');
                  resolve(window.AUTHNICE);
                  return;
                }

                attempts += 1;
                if (attempts >= maxAttempts) {
                  reject(new Error('NICEPAY SDK loaded but AUTHNICE.requestPay is unavailable'));
                  return;
                }

                window.setTimeout(poll, 150);
              }

              poll();
            };

            script.onerror = function () {
              appendLog('error', 'sdk.load:onerror', { scriptUrl: config.scriptUrl });
              reject(new Error('Failed to load NICEPAY SDK'));
            };

            document.head.appendChild(script);
          });

          return sdkPromise;
        }

        async function startPayment() {
          if (requested) {
            appendLog('warn', 'payment.request:ignored', { reason: 'already_requested' });
            return;
          }

          let config;
          try {
            config = loadConfig();
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'config.invalid', { error: message });
            setStatus(message, 'error');
            return;
          }

          requested = true;
          amountText.textContent = config.amount.toLocaleString() + 'P';
          renderMeta(config);
          setStatus('NICEPAY 결제창을 준비하는 중입니다.', 'info');
          appendLog('info', 'payment.request:start', {
            orderId: config.orderId,
            amount: config.amount,
            returnUrl: config.returnUrl,
          });

          try {
            await loadNicepaySdk(config);

            if (!window.AUTHNICE || typeof window.AUTHNICE.requestPay !== 'function') {
              throw new Error('AUTHNICE.requestPay is not available');
            }

            appendLog('info', 'payment.request:invoke');
            setStatus('결제창을 여는 중입니다.', 'info');

            window.AUTHNICE.requestPay({
              clientId: config.clientId,
              method: 'card',
              orderId: config.orderId,
              amount: config.amount,
              goodsName: config.goodsName,
              returnUrl: config.returnUrl,
              fnError: function (result) {
                requested = false;
                appendLog('error', 'payment.request:fnError', result || {});
                setStatus(
                  result && result.errorMsg ? result.errorMsg : '결제창 호출 중 오류가 발생했습니다.',
                  'error'
                );
              },
            });
          } catch (error) {
            requested = false;
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'payment.request:catch', { error: message });
            setStatus(message, 'error');
          }
        }

        copyButton.addEventListener('click', async function () {
          try {
            await navigator.clipboard.writeText(logLines.join('\n'));
            appendLog('info', 'logs.copy:success');
            setStatus('로그를 클립보드에 복사했습니다.', 'success');
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'logs.copy:failed', { error: message });
            setStatus('로그 복사에 실패했습니다.', 'error');
          }
        });

        payButton.addEventListener('click', function () {
          startPayment();
        });

        window.addEventListener('error', function (event) {
          appendLog('error', 'window.error', {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
          });
        });

        window.addEventListener('unhandledrejection', function (event) {
          appendLog('error', 'window.unhandledrejection', {
            reason: String(event.reason),
          });
        });

        window.addEventListener('load', function () {
          appendLog('info', 'window.load', {
            href: window.location.href,
            userAgent: window.navigator.userAgent,
          });

          try {
            const config = loadConfig();
            amountText.textContent = config.amount.toLocaleString() + 'P';
            renderMeta(config);
            setStatus('자동으로 결제를 시작합니다. 열리지 않으면 아래 버튼을 눌러 주세요.', 'info');
            window.setTimeout(startPayment, 250);
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            appendLog('error', 'window.load:configError', { error: message });
            setStatus(message, 'error');
          }
        });
      })();
    </script>
  </body>
</html>
